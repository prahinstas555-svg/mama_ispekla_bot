<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мама Испекла</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 id="shopName">Мама Испекла</h1>
    <p id="shopSub"></p>
  </header>

  <nav id="categories"></nav>

  <main id="products"></main>

  <div id="cartBar" class="hidden">
    <span id="cartInfo">Корзина пуста</span>
    <button id="openCart">Корзина 🛒</button>
  </div>

  <div id="cartModal" class="modal hidden">
    <div class="modal-content">
      <h2>Ваш заказ</h2>
      <div id="cartItems"></div>
      <p id="cartTotal"></p>
      <textarea id="comment" placeholder="Комментарий к заказу (адрес, дата, пожелания)"></textarea>
      <input id="customerName" placeholder="Ваше имя">
      <input id="customerPhone" placeholder="Телефон">
      <button id="sendOrder">Оформить заказ ✅</button>
      <button id="closeCart" class="secondary">Закрыть</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
