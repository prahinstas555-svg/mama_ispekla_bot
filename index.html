<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мама Испекла</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="header-inner">

    <span class="header-deco left">🌺</span>
    <span class="header-deco right">🌺</span>

    <!-- Логотип в рамке с уголками -->
    <div class="logo-frame">
      <span class="logo-frame-corner tr"></span>
      <span class="logo-frame-corner bl"></span>
      <div class="logo-wrap">
        <img
          src="logo.png"
          alt="Мама Испекла"
          class="logo-img"
          id="shopName"
        >
      </div>
    </div>

    <!-- Разделитель -->
    <div class="logo-divider">
      <div class="logo-divider-dot"></div>
      <div class="logo-divider-dot"></div>
      <div class="logo-divider-dot"></div>
    </div>

    <!-- Слоган -->
    <div class="logo-slogan" id="shopSub">
      Кондитерская-пекарня · с 2016 года
    </div>

    <!-- Нижний орнамент -->
    <div class="header-bottom-ornament">
      <div class="ornament-line">❧ ✦ ❧ ✦ ❧ ✦ ❧</div>
    </div>

  </div>

  <!-- Цветная полоса снизу -->
  <div class="header-stripe"></div>
</header>

  <div class="header-wave">
    <svg viewBox="0 0 500 30" preserveAspectRatio="none">
      <path d="M0,15 C125,30 375,0 500,15 L500,30 L0,30 Z" fill="#1a0a00"/>
    </svg>
  </div>
</header>

  <div class="header-wave">
    <svg viewBox="0 0 500 36" preserveAspectRatio="none">
      <path d="M0,18 C150,40 350,0 500,18 L500,36 L0,36 Z" fill="#d6eef0"/>
    </svg>
  </div>
</header>

  <nav id="categories"></nav>

  <main id="products"></main>

  <div id="cartBar" class="hidden">
    <div class="cart-bar-inner">
      <span id="cartInfo">Корзина пуста</span>
      <button id="openCart">
        <span>Корзина</span>
        <span class="cart-icon">🛒</span>
      </button>
    </div>
  </div>

  <div id="cartModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-handle"></div>
      <h2>Ваш заказ</h2>
      <div id="cartItems"></div>
      <p id="cartTotal"></p>
      <div class="form-group">
        <label>💬 Комментарий</label>
        <textarea id="comment" placeholder="Адрес, дата, пожелания..."></textarea>
      </div>
      <div class="form-group">
        <label>👤 Ваше имя</label>
        <input id="customerName" placeholder="Введите имя">
      </div>
      <div class="form-group">
        <label>📞 Телефон</label>
        <input id="customerPhone" placeholder="+7 (___) ___-__-__">
      </div>
      <button id="sendOrder" class="btn-primary">Оформить заказ ✅</button>
      <button id="closeCart" class="btn-secondary">Закрыть</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
